{% extends "base.html" %}
{% block title %}Register - Easy Social{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" class="form-stack">
      <label>
        Username
        <input name="username" maxlength="40" autocomplete="username" required>
      </label>
      <label>
        Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <label>
        CAPTCHA
        <span class="captcha-box">
          <img src="{{ url_for('auth.captcha_image') }}" alt="CAPTCHA challenge" width="190" height="72">
        </span>
        <input name="captcha_answer" autocomplete="off" inputmode="text" required aria-label="Enter the CAPTCHA text">
      </label>
      <button type="submit">Register</button>
    </form>
    <p class="muted">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
  </section>
{% endblock %}
