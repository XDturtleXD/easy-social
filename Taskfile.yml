version: "3"

vars:
  FLASK_APP: easy_social
  PORT: 5000

tasks:
  install:
    desc: Install project dependencies with Poetry
    cmds:
      - poetry install --with dev --no-interaction

  init-db:
    desc: Initialize the local SQLite database
    cmds:
      - poetry run flask --app {{.FLASK_APP}} init-db

  import-fake-data:
    desc: Import fake seed data into the configured database
    cmds:
      - poetry run python scripts/import_fake_data.py

  setup-supabase:
    desc: Initialize Supabase tables and Storage bucket
    cmds:
      - poetry run python scripts/setup_supabase.py

  run:
    desc: Run the Flask development server
    cmds:
      - poetry run flask --app {{.FLASK_APP}} run --port {{.PORT}}

  test:
    desc: Run the test suite
    cmds:
      - poetry run pytest

  test-unit:
    desc: Run focused unit tests
    cmds:
      - poetry run pytest -m unit

  test-integration:
    desc: Run Flask integration tests
    cmds:
      - poetry run pytest -m integration

  test-ui:
    desc: Run Selenium UI tests
    cmds:
      - poetry run pytest -m ui

  test-supabase-connection:
    desc: Test Supabase Postgres and Storage with local .env credentials
    cmds:
      - poetry run python scripts/check_supabase_connection.py

  shell:
    desc: Open a Poetry shell
    cmds:
      - poetry shell

  routes:
    desc: Show Flask routes
    cmds:
      - poetry run flask --app {{.FLASK_APP}} routes

  clean:
    desc: Remove local Python caches and pytest cache
    cmds:
      - find . -type d -name __pycache__ -prune -exec rm -rf {} +
      - rm -rf .pytest_cache
