name: Unit Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Install Poetry
        run: python -m pip install --upgrade poetry

      - name: Install dependencies
        run: task install

      - name: Run unit tests
        run: task test-unit
